services:
  api:
    build:
      context: ./backend
    environment:
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_MODEL: ${FIREWORKS_MODEL:-accounts/fireworks/models/gemma-4-26b-a4b-it}
      AMD_PROOF_FILE: ${AMD_PROOF_FILE:-}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma-4-26b-a4b-it}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
